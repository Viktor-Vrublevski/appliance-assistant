spring.application.name=appliance-assistant
server.port=9090
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# PostgreSql settings
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# AI settings
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:default}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.base-url=https://api.anthropic.com
spring.ai.anthropic.chat.options.max-tokens=2000
spring.ai.chat.client.enabled=true
# Chroma settings
spring.ai.vectorstore.chroma.client.host=http://localhost
spring.ai.vectorstore.chroma.client.port=8000
spring.ai.vectorstore.chroma.initialize-schema=true
spring.ai.vectorstore.chroma.collection-name=appliance-assistant
spring.ai.vectorstore.chroma.database-name=appliance
# Embedding settings
spring.ai.model.embedding=transformers
