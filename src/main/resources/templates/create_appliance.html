<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeHub - Register Appliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans antialiased">

<main class="max-w-2xl mx-auto p-6 md:p-12">
    <div class="mb-6">
        <a th:href="@{/main}" class="text-sm font-medium text-slate-500 hover:text-slate-800 flex items-center space-x-1">
            <span>&larr;</span> <span>Back to Dashboard</span>
        </a>
        <!--/*@thymesVar id="successMessage" type=""*/-->
        <div th:if="${successMessage}"
             class="p-4 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl text-sm"
             th:text="${successMessage}">
            Operation completed successfully!
        </div>
    </div>

    <section class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
        <div class="flex items-center space-x-3 mb-4">
            <div class="p-2 bg-amber-50 text-amber-600 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 5h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V7a2 2 0 012-2z"/>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-900">Register Appliance Unit</h2>
        </div>
        <p class="text-sm text-slate-500 mb-6">Map individual hardware profiles directly to existing users and archive
            user technical data sheets.</p>

        <form th:action="@{/appliances/v1/create}" method="POST" th:object="${appliance}" enctype="multipart/form-data"
              class="space-y-4">

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Serial
                        Number*</label>
                    <input type="text" name="serialNumber" maxlength="100" required placeholder="SN-98234-XYZ"
                           class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-2.5 text-sm outline-none transition"/>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Category
                        Type*</label>
                    <input type="text" name="category" maxlength="100" required placeholder="Reftigerator, HVAC"
                           class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-2.5 text-sm outline-none transition"/>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Model
                        Number*</label>
                    <input type="text" name="modelNumber" maxlength="100" required placeholder="MOD-2026-X"
                           class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-2.5 text-sm outline-none transition"/>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Model
                        Commercial Name*</label>
                    <input type="text" name="modelName" maxlength="150" required placeholder="HomeHub EcoFreezer"
                           class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-2.5 text-sm outline-none transition"/>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Manufacture
                        Date</label>
                    <input type="date" name="manufactureDate"
                           class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-2.5 text-sm outline-none transition"/>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Warranty
                        Expiry Date</label>
                    <input type="date" name="warrantyExpiryDate"
                           class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-2.5 text-sm outline-none transition"/>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Assigned Device
                    Owner (Foreign Key)*</label>
                <select name="ownerUsername" required
                        class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-2.5 text-sm outline-none transition appearance-none">
                    <option value="" disabled selected>-- Select target username lookup --</option>
                    <option th:each="user : ${users}"
                            th:value="${user.username}"
                            th:text="${user.username} + ' (' + ${user.userFullName} + ')'">
                        username_preview
                    </option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Appliance Manual
                    Guide (PDF format)</label>
                <input type="file" name="manualFile" accept=".pdf"
                       class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 border border-dashed border-slate-200 rounded-xl p-2 bg-slate-50"/>
            </div>

            <div class="pt-4 flex items-center space-x-3">
                <button type="submit"
                        class="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded-xl transition text-sm shadow-sm">
                    Link Appliance to Account
                </button>
                <a th:href="@{/}"
                   class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-sm font-medium transition">
                    Cancel
                </a>
            </div>
        </form>
    </section>
</main>

</body>
</html>
