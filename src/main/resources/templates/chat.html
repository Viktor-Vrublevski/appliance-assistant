<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar handling for the chat window */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col justify-between font-sans">

<header class="bg-white border-b border-slate-200 py-4 px-6 flex items-center justify-between shadow-sm">
    <div class="flex items-center space-x-3">
        <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
        <h1 class="text-lg font-semibold text-slate-800">AI Assistant</h1>
    </div>
    <span class="text-xs text-slate-400 font-mono">Thymeleaf Engine</span>
</header>

<main class="chat-container flex-1 overflow-y-auto p-4 md:p-6 space-y-4 max-w-4xl w-full mx-auto">
    <div class="mb-6">
        <a th:href="@{/main}" class="text-sm font-medium text-slate-500 hover:text-slate-800 flex items-center space-x-1">
            <span>&larr;</span> <span>Back to Dashboard</span>
        </a>
    </div>

    <div th:if="${#lists.isEmpty(chatHistory)}" class="text-center py-12">
        <div class="inline-flex p-3 bg-indigo-50 text-indigo-600 rounded-full mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
        </div>
        <h2 class="text-xl font-medium text-slate-700">How can I assist you today?</h2>
        <p class="text-sm text-slate-400 mt-1">Ask questions regarding your codebase, structure, or workflows.</p>
    </div>

    <div th:each="msg : ${chatHistory}" class="flex flex-col w-full">

        <div th:if="${msg.sender == 'USER'}" class="flex justify-end mb-2 pl-12">
            <div class="bg-indigo-600 text-white rounded-2xl rounded-tr-none px-4 py-2.5 shadow-sm max-w-xl">
                <p class="text-sm leading-relaxed whitespace-pre-wrap" th:text="${msg.content}">User prompt message text
                    goes here.</p>
                <span class="block text-[10px] text-indigo-200 mt-1 text-right"
                      th:text="${#temporals.format(msg.timestamp, 'HH:mm')}">10:42</span>
            </div>
        </div>

        <div th:if="${msg.sender == 'AI'}" class="flex justify-start mb-2 pr-12">
            <div class="bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-none px-4 py-2.5 shadow-sm max-w-xl">
                <div class="flex items-center space-x-1 mb-1 text-xs text-slate-400 font-semibold">
                    <span>AI Assistant</span>
                </div>
                <p class="text-sm leading-relaxed whitespace-pre-wrap text-slate-700" th:text="${msg.content}">AI
                    structural response goes here.</p>
                <span class="block text-[10px] text-slate-400 mt-1"
                      th:text="${#temporals.format(msg.timestamp, 'HH:mm')}">10:43</span>
            </div>
        </div>

    </div>
</main>

<footer class="bg-white border-t border-slate-200 p-4 sticky bottom-0">
    <div class="max-w-4xl w-full mx-auto">
        <form th:action="@{/chat/send}" method="POST" class="flex items-center space-x-3">
            <input
                    type="text"
                    name="message"
                    placeholder="Type your prompt here..."
                    required
                    autocomplete="off"
                    class="flex-1 bg-slate-100 border border-transparent focus:border-indigo-500 focus:bg-white text-slate-800 rounded-xl px-4 py-3 text-sm placeholder-slate-400 focus:outline-none transition duration-150 ease-in-out"
            />
            <button
                    type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl font-medium text-sm transition duration-150 ease-in-out shadow-sm flex items-center justify-center space-x-1"
            >
                <span>Send</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform rotate-90" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
            </button>
        </form>
    </div>
</footer>

<script>
    const container = document.querySelector('.chat-container');
    if (container) {
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
