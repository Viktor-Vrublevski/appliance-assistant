<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }

        /* Cleans up spacing quirks caused by markdown paragraph breaks inside chat bubbles */
        .markdown-content p {
            margin-bottom: 0.5rem;
        }
        .markdown-content p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col justify-between font-sans">

<header class="bg-white border-b border-slate-200 py-4 px-6 flex items-center justify-between shadow-sm">
    <div class="flex items-center space-x-3">
        <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
        <h1 class="text-lg font-semibold text-slate-800">AI Assistant</h1>
    </div>
    <span class="text-xs text-slate-400 font-mono">Thymeleaf Engine</span>
</header>

<main class="chat-container flex-1 overflow-y-auto p-4 md:p-6 space-y-4 max-w-4xl w-full mx-auto">
    <div class="mb-6 flex items-center justify-between">
        <a th:href="@{/main}" class="text-sm font-medium text-slate-500 hover:text-slate-800 flex items-center space-x-1">
            <span>&larr;</span> <span>Back to Dashboard</span>
        </a>
        <form th:action="@{/chat/clear}" method="POST" class="inline">
            <button type="submit"
                    class="text-sm font-medium text-rose-600 hover:text-rose-800 flex items-center space-x-1.5 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition duration-150 ease-in-out">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                <span>New Chat</span>
            </button>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(chatHistory)}" class="text-center py-12">
        <div class="inline-flex p-3 bg-indigo-50 text-indigo-600 rounded-full mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
        </div>
        <h2 class="text-xl font-medium text-slate-700">How can I assist you today?</h2>
        <p class="text-sm text-slate-400 mt-1">Ask questions regarding your codebase, structure, or workflows.</p>
    </div>

    <div th:each="msg : ${chatHistory}" class="flex flex-col w-full">

        <div th:if="${msg.sender == 'USER'}" class="flex justify-end mb-2 pl-12">
            <div class="bg-indigo-600 text-white rounded-2xl rounded-tr-none px-4 py-2.5 shadow-sm max-w-xl">
                <p class="text-sm leading-relaxed whitespace-pre-wrap" th:text="${msg.content}">User prompt message text goes here.</p>
                <span class="block text-[10px] text-indigo-200 mt-1 text-right"
                      th:text="${#temporals.format(msg.timestamp, 'HH:mm')}">10:42</span>
            </div>
        </div>

        <div th:if="${msg.sender == 'AI'}" class="flex justify-start mb-2 pr-12">
            <div class="bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-none px-4 py-2.5 shadow-sm max-w-xl">
                <div class="flex items-center space-x-1 mb-1 text-xs text-slate-400 font-semibold">
                    <span>AI Assistant</span>
                </div>
                <div class="markdown-content text-sm leading-relaxed text-slate-700" th:utext="${msg.content}">
                    AI structural response goes here.
                </div>
                <span class="block text-[10px] text-slate-400 mt-1"
                      th:text="${#temporals.format(msg.timestamp, 'HH:mm')}">10:43</span>
            </div>
        </div>

    </div>
</main>

<footer class="bg-white border-t border-slate-200 p-4 sticky bottom-0">
    <div class="max-w-4xl w-full mx-auto">
        <form id="chatForm" th:action="@{/chat/send}" method="POST" class="flex items-center space-x-3">
            <input
                    id="messageInput"
                    type="text"
                    name="message"
                    placeholder="Type your prompt here..."
                    required
                    autocomplete="off"
                    class="flex-1 bg-slate-100 border border-transparent focus:border-indigo-500 focus:bg-white text-slate-800 rounded-xl px-4 py-3 text-sm placeholder-slate-400 focus:outline-none transition duration-150 ease-in-out"
            />
            <button
                    type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl font-medium text-sm transition duration-150 ease-in-out shadow-sm flex items-center justify-center space-x-1"
            >
                <span>Send</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform rotate-90" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
            </button>
        </form>
    </div>
</footer>
<script>
    const container = document.querySelector('.chat-container');
    if (container) {
        container.scrollTop = container.scrollHeight;
    }
</script>
<script>
    marked.setOptions({
        gfm: true,
        breaks: true
    });
    function renderMarkdown() {
        document.querySelectorAll('.markdown-content').forEach(el => {
            if (!el.classList.contains('markdown-parsed')) {
                el.innerHTML = marked.parse(el.textContent || el.innerText);
                el.classList.add('markdown-parsed');
            }
        });
    }
    document.addEventListener("DOMContentLoaded", renderMarkdown);
    document.getElementById('chatForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const input = document.getElementById('messageInput');
        const messageText = input.value.trim();
        if (!messageText) return;
        const container = document.querySelector('.chat-container');
        const starterCard = container.querySelector('.text-center.py-12');
        if (starterCard) starterCard.remove();
        const now = new Date();
        const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const userMessageHtml = `
            <div class="flex flex-col w-full user-temp-msg">
                <div class="flex justify-end mb-2 pl-12">
                    <div class="bg-indigo-600 text-white rounded-2xl rounded-tr-none px-4 py-2.5 shadow-sm max-w-xl">
                        <p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(messageText)}</p>
                        <span class="block text-[10px] text-indigo-200 mt-1 text-right">${timeString}</span>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', userMessageHtml);
        input.value = '';
        container.scrollTop = container.scrollHeight;
        const aiPlaceholderHtml = `
            <div id="ai-loading" class="flex flex-col w-full">
                <div class="flex justify-start mb-2 pr-12">
                    <div class="bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-none px-4 py-2.5 shadow-sm max-w-xl">
                        <span class="text-xs text-slate-400 font-semibold">AI Assistant</span>
                        <p class="text-sm text-slate-400 italic animate-pulse mt-1">Thinking...</p>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', aiPlaceholderHtml);
        container.scrollTop = container.scrollHeight;
        const formData = new FormData();
        formData.append('message', messageText);

        fetch('/chat/send', {
            method: 'POST',
            body: formData
        })
            .then(response => {
                return response.text();
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                container.innerHTML = doc.querySelector('.chat-container').innerHTML;
                renderMarkdown();
                container.scrollTop = container.scrollHeight;
            })
            .catch(err => {
                console.error(err);
                const loader = document.getElementById('ai-loading');
                if (loader) loader.remove();
            });
    });
    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>
</body>
</html>
