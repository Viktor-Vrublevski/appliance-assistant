<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeHub - User Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center items-center p-6 font-sans antialiased">

<div class="max-w-md w-full bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">

    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">HomeHub</h1>
        <p class="text-sm text-slate-500 mt-1">Enter your unique username to access your workspace</p>
    </div>

    <div th:if="${errorMessage}"
         class="mb-4 p-3.5 bg-rose-50 border border-rose-200 text-rose-800 rounded-xl text-sm font-medium flex items-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-rose-500 flex-shrink-0" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span th:text="${errorMessage}">There is no such username</span>
    </div>

    <form th:action="@{/verify-user}" method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Username
                Identifier</label>
            <input
                    type="text"
                    name="username"
                    required
                    autofocus
                    placeholder="e.g., john_doe47"
                    class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white rounded-xl px-4 py-3 text-sm outline-none transition"
            />
        </div>

        <button
                type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition text-sm shadow-sm flex items-center justify-center space-x-1"
        >
            <span>Enter</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
            </svg>
        </button>
    </form>

    <div class="mt-6 pt-6 border-t border-slate-100 text-center">
        <p class="text-xs text-slate-400">
            New installation setup?
            <a th:href="@{/users/v1/create-view}" class="text-indigo-600 hover:underline font-medium ml-1">Register
                User</a>
        </p>
    </div>

</div>

</body>
</html>
